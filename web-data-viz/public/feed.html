<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Feed</title>
</head>

<body onload="exibirMidias()">
    <div class="main">

        <nav class="navegacao">
            <div class="nav-titulo">
                <a href="index.html">RootSounds</a>
            </div>
            <div class="nav-text">
                <a href="dashboard/dashboard.html" class="txtnav">DashBoard</a>
                <a href="feed.html" class="txtnav">Feed</a>
                <a href="cadastro.html" class="txtnav">Cadastro</a>
                <a href="login.html" class="txtnav">
                    <p class="nav-login">Login</p>
                </a>
            </div>
        </nav>

        <div class="feed-titulo">
            <p>Mídias cadastradas</p>
        </div>

        <div class="feed-conteudo" id="feed_conteudo">

            <div class="feed-trio" id="feed_trio">

            </div>

        </div>

        <div id="popup-album" class="popup">

            <div class="popup-conteudo">

                <p class="fechar" onclick="fecharPopup()">
                    ×
                </p>

                <h1 class="titulo-popup">Faixas do álbum</h1>
                <br>

                <ul class="popup-lista-musicas" id="ul_musicas">

                </ul>

            </div>
        </div>

        <div id="popup-criar-midia" class="popup">

            <div class="popup-conteudo">

                <p class="fechar" onclick="fecharPopup()">
                    ×
                </p>

                <select name="" id="select_musicaOuAlbum">
                    <option value="musica">Música</option>
                    <option value="album">Álbum</option>
                </select>

                <input type="text" name="" id="ipt_titulo" placeholder="Título">
                <input type="date" name="" id="ipt_dataLancamento" placeholder="Data de Lançamento">
                <input type="text" name="" id="ipt_duracao" placeholder="Duração">
                <input type="text" name="" id="ipt_capa" placeholder="Capa">
                <input type="text" name="" id="ipt_album" placeholder="Album">

                <button onclick="criarMidia()">Criar Mídia</button>

            </div>
        </div>

        <footer class="rodape">

        </footer>
    </div>
</body>

</html>

<script>

    var listaDeMidiasCadastradas = []
    var listaDePostagensCurtidas = []
    var listaDeMidiasPorAlbum = []
    var todasAsMidias = []

    function curtir(botao, idMidia) {

        let emailVar = sessionStorage.EMAIL_USUARIO;
        let idMidiaVar = 0;

        if (emailVar == undefined) {
            alert("você deve fazer login!")
        } else {
            if (botao.classList.contains("botao-curtido")) {

                fetch("/midias/descurtir", {
                    method: "DELETE",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        emailServer: emailVar,
                        idMidiaServer: idMidia
                    })
                }).then(function (resposta) {
                    if (resposta.ok) {

                        botao.classList.remove("botao-curtido");

                    } else {
                        throw "Houve um erro ao tentar Descurtir!";
                    }

                }).catch(function (resposta) {
                    console.log("#ERRO:" + resposta);
                })


            } else {
                fetch("/midias/curtir", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        emailServer: emailVar,
                        idMidiaServer: idMidia
                    })
                }).then(function (resposta) {
                    if (resposta.ok) {

                        botao.classList.add("botao-curtido");

                    } else {
                        throw "Houve um erro ao tentar Curtir!";
                    }

                }).catch(function (resposta) {
                    console.log("#ERRO:" + resposta);
                })
            }
        }
    }

    function abrirAlbum(idMidia) {
        var listaDeMidiasPorAlbum = []
        fetch("/midias/listarMusicasDoAlbum", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idAlbumServer: idMidia
            })
        })
            .then(function (resposta) {
                resposta.json().then((midias) => {
                    midias.forEach((midia) => {
                        listaDeMidiasPorAlbum.push(midia);
                    })
                });
            }).catch(function (resposta) {
                console.log(resposta)
            })

        setTimeout(() => {
            if (listaDeMidiasPorAlbum.length == 0) {

            }
            else {

                exibirMusicasDoAlbum(listaDeMidiasPorAlbum);

            }
        }, 100);
    }

    function abrirCriarMidiaPopup() {
        if (sessionStorage.ID_USUARIO == undefined) {
            alert("Você precisa estra logado para criar uma mídia")
        }
        else {
            document.getElementById("popup-criar-midia").style.display = "flex";
            ipt_titulo.value = ""
            ipt_dataLancamento.value = ""
            ipt_duracao.value = ""
            ipt_capa.value = ""
        }
    }


    function exibirMusicasDoAlbum(listaDeMusicas) {

        listarCurtidas();
        setTimeout(() => {
            console.log(listaDePostagensCurtidas)


            let listaDeIdsDasMusicasCurtidas = []

            for (let i = 0; i <= listaDePostagensCurtidas.length - 1; i++) {
                listaDeIdsDasMusicasCurtidas.push(listaDePostagensCurtidas[i].idMidia)
            }

            ul_musicas.innerHTML = ''
            for (let i = 0; i <= listaDeMusicas.length - 1; i++) {

                if (listaDeIdsDasMusicasCurtidas.includes(listaDeMusicas[i].idMidia)) {
                    ul_musicas.innerHTML += `<li class="li-musicas">${i + 1}. ${listaDeMusicas[i].titulo}         ${listaDeMusicas[i].duracao} <div class="div-popup-curtida"><button class="botao-curtirComentario botao-curtido" onclick="curtir(this, ${listaDeMusicas[i].idMidia})"><img src="css/img/like-vazio.png" alt="curtir" class="feed-curtidaComentario-img"></button></div></li><br>`
                }
                else {
                    ul_musicas.innerHTML += `<li class="li-musicas">${i + 1}. ${listaDeMusicas[i].titulo}         ${listaDeMusicas[i].duracao} <button class="botao-curtirComentario" onclick="curtir(this, ${listaDeMusicas[i].idMidia})"><img src="css/img/like-vazio.png" alt="curtir" class="feed-curtidaComentario-img"></button></li><br>`
                }
            }

            document.getElementById("popup-album").style.display = "flex";
        }, 100)

    }

    function fecharPopup() {
        document.getElementById("popup-album").style.display = "none";
        document.getElementById("popup-criar-midia").style.display = "none";
    }

    function listarCurtidas() {

        if (sessionStorage.ID_USUARIO == undefined) {
            alert("Para interagir com a nossa página você precisa fazer login!")
        } else {
            listaDePostagensCurtidas = []
            fetch("/midias/listarCurtidas", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    idUsuarioServer: sessionStorage.ID_USUARIO
                })
            })
                .then(function (resposta) {
                    resposta.json().then((curtidas) => {

                        curtidas.forEach((curtida) => {
                            listaDePostagensCurtidas.push(curtida);
                        });

                    });
                })

                .catch(function (resposta) {
                    console.log(`#ERRO: ${resposta}`);
                })
        }

    }
    listarCurtidas();

    function listar() {
        fetch("/midias/listar", {
            method: "GET",
        })
            .then(function (resposta) {
                resposta.json().then((midias) => {

                    midias.forEach((midia) => {
                        listaDeMidiasCadastradas.push(midia);
                    });
                });
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });
    }
    listar();

    function listarTODAS() {
        fetch("/midias/listarTodas", {
            method: "GET"
        }).then(function (resposta) {
            resposta.json().then((midias) => {
                midias.forEach((midia) => {
                    todasAsMidias.push(midia)
                })
            })
        }).catch(function (resposta) {
            console.log(resposta)
        })
    }
    listarTODAS();

    function exibirMidias() {

        setTimeout(() => {
            let listaDeIdsDasMusicasCurtidas = []

            for (let i = 0; i <= listaDePostagensCurtidas.length - 1; i++) {
                listaDeIdsDasMusicasCurtidas.push(listaDePostagensCurtidas[i].idMidia)
            }

            feed_trio.innerHTML = `
            <div class="feed-card-adicionar">
                <div class="div-adicionar"><button class="feed-botao-adicionar" onclick="abrirCriarMidiaPopup()"><img src="css/img/sinalDeMais.png" class="feed-img-adicionar"></button></div>
            </div>`

            for (let i = listaDeMidiasCadastradas.length - 1; i >= 0; i--) {

                if (listaDeIdsDasMusicasCurtidas.includes(listaDeMidiasCadastradas[i].idMidia)) {
                    feed_trio.innerHTML +=
                        `
                        
                                <div class="feed-card">

                                <img class="imagem-musica"
                                    src="${listaDeMidiasCadastradas[i].capa}"
                                    alt="Capa da música"
                                    onclick="abrirAlbum(${listaDeMidiasCadastradas[i].idMidia})">

                                <div class="feed-card-conteudo">
                                    <h1 class="feed-card-titulo">${listaDeMidiasCadastradas[i].titulo}</h1>
                                    <h2 class="feed-card-artista">${listaDeMidiasCadastradas[i].artista}</h2>

                                    <div class="feed-card-info">
                                        <p class="feed-duracao">${listaDeMidiasCadastradas[i].duracao}</p>
                                        <p>${listaDeMidiasCadastradas[i].tipo}</p>
                                        <p>${listaDeMidiasCadastradas[i].ano}</p>
                                    </div>
                                    <div class="feed-card-botoes">
                                        <button class="botao-curtirComentario botao-curtido" onclick="curtir(this, ${listaDeMidiasCadastradas[i].idMidia})">
                                            <img src="css/img/like-vazio.png" alt="curtir" class="feed-curtidaComentario-img">
                                        </button>
                                        <button class="botao-curtirComentario" onclick="">
                                            <img src="css/img/comentario.png" alt="comentar" class="feed-curtidaComentario-img">
                                        </button>
                                    </div>
                                </div>

                            </div>
                    
                        `
                }
                else {
                    feed_trio.innerHTML +=
                        `
                
                    <div class="feed-card">

                        <img class="imagem-musica"
                            src="${listaDeMidiasCadastradas[i].capa}"
                            alt="Capa da música"
                            onclick="abrirAlbum(${listaDeMidiasCadastradas[i].idMidia})">

                        <div class="feed-card-conteudo">
                            <h1 class="feed-card-titulo">${listaDeMidiasCadastradas[i].titulo}</h1>
                            <h2 class="feed-card-artista">${listaDeMidiasCadastradas[i].artista}</h2>

                            <div class="feed-card-info">
                                <p class="feed-duracao">${listaDeMidiasCadastradas[i].duracao}</p>
                                <p>${listaDeMidiasCadastradas[i].tipo}</p>
                                <p>${listaDeMidiasCadastradas[i].ano}</p>
                            </div>
                            <div class="feed-card-botoes">
                                <button class="botao-curtirComentario" onclick="curtir(this, ${listaDeMidiasCadastradas[i].idMidia})">
                                    <img src="css/img/like-vazio.png" alt="curtir" class="feed-curtidaComentario-img">
                                </button>
                                <button class="botao-curtirComentario" onclick="">
                                    <img src="css/img/comentario.png" alt="comentar" class="feed-curtidaComentario-img">
                                </button>
                            </div>
                        </div>

                    </div>
            
                `
                }
            }
        }, 100)


    }

    function criarMidia() {
        let musicaOuAlbum = select_musicaOuAlbum.value
        let titulo = String(ipt_titulo.value).trim()
        let dtLancamento = ipt_dataLancamento.value
        let duracao = String(ipt_duracao.value).trim()
        let capa = String(ipt_capa.value).trim()
        let album = String(ipt_album.value).trim()
        let titulosAlbuns = []

        setTimeout(() => {
            console.log(todasAsMidias)

            for (let i = 0; i <= todasAsMidias.length - 1; i++){
                titulosAlbuns.push(todasAsMidias[i].titulo);
            }

            console.log(titulosAlbuns);

            for (let i = 0; i <= todasAsMidias.length - 1; i++) {

                if (titulo == todasAsMidias[i].titulo) {
                    alert("já existe uma mídia com esse nome!!")
                    return
                } else if (titulo.length <= 2) {
                    alert("O título da midia deve ter mais de 2 dígitos!!")
                    return
                } else if (titulo == "") {
                    alert("O campo de titulo está fazio")
                    return
                } else if (dtLancamento == "") {
                    alert("Digite uma data de lançamento.")
                    return
                } else if (duracao == "") {
                    alert("Digite a duração.")
                    return
                }  else if (capa == "") {
                    alert("Digite o link da capa.")
                    return
                } else if (!capa.endsWith(".png") && !capa.endsWith(".jpg") && !capa.endsWith(".jpeg") && !capa.endsWith(".webp")) {
                    alert("Digite um link de imagem válido.")
                    return
                } else if(musicaOuAlbum == "musica" && album != "" && !titulosAlbuns.includes(album)){
                    alert("Esse álbum não existe!")
                    return
                }else if(musicaOuAlbum == "album" && album != ""){
                    alert("não pode cadastrar um album dentro de outro!")
                    return
                }
            }
            fetch("/midias/criarMidia", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    tipoServer: musicaOuAlbum,
                    tituloServer: titulo,
                    lancamentoServer: dtLancamento,
                    duracaoServer: duracao,
                    capaServer: capa,
                    idUsuarioServer: sessionStorage.ID_USUARIO,
                    albumServer : album
                })
            }
            ).then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    console.log("midia cadastrada")
                    window.location.reload();
                } else {
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }

            }).catch(function (resposta) {
                console.log(resposta);
            })
        }, 100)


    }

</script>
