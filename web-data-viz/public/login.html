<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="https://avatars.githubusercontent.com/u/274922664?s=200&v=4">
    <title>Login</title>
</head>

<body>
    <div class="cadastro">
        <div class="main-cadastro">
            <div class="card-cadastro">
                <h2>Login</h2>
                <div class="card-cadastro-inputs">
                    <input type="email" name="" id="ipt_email" placeholder="Email">
                    <input type="password" name="" id="ipt_senha" placeholder="Senha">
                </div>

                <div class="card-cadastro-buttons">
                    <a onclick="entrar()" class="cadastro-button">Entrar</a>
                    <a href="index.html" class="voltar-button">Voltar</a>
                </div>
            </div>
            <div>
                <p id="mensagem_erro" class="cadastor-msg-erro"></p>
            </div>
        </div>
    </div>
</body>

</html>

<script>


    function entrar() {
        var emailVar = String(ipt_email.value);
        var senhaVar = String(ipt_senha.value);

        if (emailVar == "" || senhaVar == "") {
            mensagem_erro.innerHTML = "Há campos em branco";
            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar",
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(
                    {
                        emailServer: emailVar,
                        senhaServer: senhaVar
                    })
            }
        ).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")
            console.log(resposta);

            console.log(resposta.ok)

            if (resposta.ok) {
                console.log(resposta);


                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;

                    mensagem_erro.innerHTML = "indo para a dashBoard"

                    setTimeout(function () {
                        window.location = "index.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {
                mensagem_erro.innerHTML = "Usuario não encontrado!"
                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

</script>
