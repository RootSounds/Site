<!DOCTYPE html>
<html lang="pt-br">

<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="https://avatars.githubusercontent.com/u/274922664?s=200&v=4">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>DashBoard</title>
</head>

<body onload="cadastrado(), musicaMaisCurtida(), albumMaisCurtido(), ExibirDados(), artistasMaisCurtidos()">
    <div class="main">

        <nav class="navegacao">
            <div class="nav-titulo">
                <a href="../index.html">RootSounds</a>
            </div>
            <div class="nav-text">
                <a href="dashboard.html" class="txtnav">DashBoard</a>
                <a href="../feed.html" class="txtnav">Feed</a>
                <a href="../cadastro.html" class="txtnav">Cadastro</a>
                <a href="../login.html" class="txtnav">
                    <p class="nav-login">Login</p>
                </a>
            </div>
        </nav>

        <div class="nav-dashBoard">
            <a href="dashboard.html" class="text-nav-dashBoard">DashBoard</a>
        </div>

        <div class="dashboard-content">

            <div class="div-kpis" id="kpi_content">

            </div>

        </div>


    </div>
</body>

</html>

<script>

    let musicaMaisCurtidaObjeto = {};
    let albumMaisCurtidoObjeto = {};
    let listaArtistasMaisCurtidos = []

    function cadastrado() {
        if (sessionStorage.ID_USUARIO == undefined) {
            window.location = "../index.html";
            alert("Você deve etar logado para acessar a dashBoard!")
        }
    }

    /*TerMinar essa funçao*/
    function musicaMaisCurtida() {
        fetch("/midias/musicaMaisCurtida", {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        })
            .then(function (resposta) {

                if (resposta.ok) {
                    resposta.json().then((midia) => {
                        musicaMaisCurtidaObjeto = midia[0];
                    })
                } else {
                    console.log("algo deu errado!")
                }

            })
            .catch(function (resposta) {
                console.log(resposta)
            })
    }


    function albumMaisCurtido() {
        fetch("/midias/albumMaisCurtido", {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        }).then(function (resposta) {
            if (resposta.ok) {
                resposta.json().then((album) => {
                    albumMaisCurtidoObjeto = album[0]
                })
            }
            else {
                console.log("aconteceu um erro")
            }
        }).catch(function (resposta) {
            console.log(resposta)
        })
    }

    function artistasMaisCurtidos() {
        fetch("/midias/artistasMaisCurtidos", {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        }).then(function (resposta) {
            if (resposta.ok) {
                resposta.json().then((artistas) => {
                    artistas.forEach(artista => {
                        console.log()
                        listaArtistasMaisCurtidos.push(artista);
                    });
                })
            }
            else {
                console.log("Aconteceu um erro")
                console.log(resposta)
            }
        }).catch(function (resposta) {
            console.log(resposta)
        })
    }


    function ExibirDados() {
        setTimeout(() => {
            console.log(musicaMaisCurtidaObjeto)
            console.log(albumMaisCurtidoObjeto)
            console.log(listaArtistasMaisCurtidos)
            kpi_content.innerHTML += `
                <div class="kpi-card">
                    <p class="kpi-titulo">Música mais curtida</p>
                    <img src="${musicaMaisCurtidaObjeto.capa}"
                        class="kpi-img">
                    <p class="kpi-nomeMidia">${musicaMaisCurtidaObjeto.titulo}</p>
                    <div class="kpi-dados-card">
                        <div class="coracao-kpi">
                            <img src="../css/img/like-vazio.png" alt="curtir" class="feed-curtidaComentario-img">
                        </div>
                        <p class="dado-kpi">${musicaMaisCurtidaObjeto.curtidas}</p>
                    </div>
                </div>`

            kpi_content.innerHTML += `
            
                <div class="div-artistasMaisCurtidos">
                    <canvas id="graficoPizza"></canvas>
                </div>`

            kpi_content.innerHTML += `
                <div class="kpi-card">
                    <p class="kpi-titulo">Álbum mais curtido</p>
                    <img src="${albumMaisCurtidoObjeto.capa}"
                        class="kpi-img">
                    <p class="kpi-nomeMidia">${albumMaisCurtidoObjeto.titulo}</p>
                    <div class="kpi-dados-card">
                        <div class="coracao-kpi">
                            <img src="../css/img/like-vazio.png" alt="curtir" class="feed-curtidaComentario-img">
                        </div>
                        <p class="dado-kpi">${albumMaisCurtidoObjeto.curtidas}</p>
                    </div>
                </div>`


            const graficoPizza = document.getElementById('graficoPizza');

            new Chart(graficoPizza, {
                type: 'pie',

                data: {
                    labels: [listaArtistasMaisCurtidos[0].nome, listaArtistasMaisCurtidos[1].nome, listaArtistasMaisCurtidos[2].nome, listaArtistasMaisCurtidos[3].nome, listaArtistasMaisCurtidos[4].nome],

                    datasets: [{
                        label: 'Quantidade',
                        data: [listaArtistasMaisCurtidos[0].curtidasRecebidas, listaArtistasMaisCurtidos[1].curtidasRecebidas, listaArtistasMaisCurtidos[2].curtidasRecebidas, listaArtistasMaisCurtidos[3].curtidasRecebidas, listaArtistasMaisCurtidos[4].curtidasRecebidas],

                        backgroundColor:
                            [
                                "#2B2B2B",
                                "#4A4A4A",
                                "#707070",
                                "#9A9A9A",
                                "#C7C7C7"
                            ],

                        borderWidth: 2
                    }]
                },

                options: {
                    responsive: true
                }
            });

        }, 100)

    }





</script>
